---
# ==============================================================================
#  Media Server Stack
#  Services: Prowlarr, Sonarr, Radarr, qBittorrent
#
#  All configuration is driven by the .env file in this directory.
#  Copy .env.example to .env, fill in your values, then run:
#
#    1. ./deploy.sh         — create directories, start containers, wire services
#    2. Add indexers in Prowlarr
#    3. Add subtitle providers in Bazarr
#
#  Flow:
#    Prowlarr (find it) → Sonarr/Radarr (decide + queue it)
#      → qBittorrent (download it) → Sonarr/Radarr (organise it)
#
# ==============================================================================

services:

  # ----------------------------------------------------------------------------
  #  PROWLARR — Indexer manager
  #  Access: http://<server-ip>:${PROWLARR_PORT}
  #
  #  Add your torrent indexers here. Prowlarr syncs them to
  #  Sonarr and Radarr automatically — do not add indexers
  #  directly in Sonarr or Radarr.
  # ----------------------------------------------------------------------------
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${PROWLARR_CONFIG}:/config
    ports:
      - ${PROWLARR_PORT}:9696
    networks:
      - media-net


  # ----------------------------------------------------------------------------
  #  SONARR — TV show and anime manager
  #  Access: http://<server-ip>:${SONARR_PORT}
  #
  #  Monitors for new episodes, queues downloads through
  #  qBittorrent, then renames and moves completed files
  #  into your media library automatically.
  #
  #  In Sonarr, add two root folders:
  #    /media/tvshows  — for regular TV shows
  #    /media/anime    — for anime (Shoko reads from here)
  # ----------------------------------------------------------------------------
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    depends_on:
      - prowlarr
      - qbittorrent
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${SONARR_CONFIG}:/config
      - ${MEDIA_ROOT}/tvshows:/media/tvshows
      - ${MEDIA_ROOT}/anime:/media/anime
      - ${DOWNLOADS_DIR}:/downloads
    ports:
      - ${SONARR_PORT}:8989
    networks:
      - media-net


  # ----------------------------------------------------------------------------
  #  RADARR — Movie manager
  #  Access: http://<server-ip>:${RADARR_PORT}
  #
  #  Same as Sonarr but for movies. Monitors for new releases,
  #  queues downloads through qBittorrent, and organises
  #  completed files into your movie library.
  # ----------------------------------------------------------------------------
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    depends_on:
      - prowlarr
      - qbittorrent
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${RADARR_CONFIG}:/config
      - ${MEDIA_ROOT}/movies:/media/movies
      - ${DOWNLOADS_DIR}:/downloads
    ports:
      - ${RADARR_PORT}:7878
    networks:
      - media-net


  # ----------------------------------------------------------------------------
  #  QBITTORRENT — Torrent download client
  #  Access: http://<server-ip>:${QBIT_PORT}
  #
  #  A temporary password is generated on first startup and
  #  printed to the container log. The setup script reads it
  #  automatically. Once you set a permanent password through
  #  the web UI, it persists across restarts.
  #
  #  To view the temporary password manually:
  #    docker logs qbittorrent | grep "temporary password"
  # ----------------------------------------------------------------------------
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=${QBIT_PORT}
      - TORRENTING_PORT=${QBIT_TORRENT_PORT}
    volumes:
      - ${QBIT_CONFIG}:/config
      - ${DOWNLOADS_DIR}:/downloads
    ports:
      - ${QBIT_PORT}:${QBIT_PORT}
      - ${QBIT_TORRENT_PORT}:${QBIT_TORRENT_PORT}
      - ${QBIT_TORRENT_PORT}:${QBIT_TORRENT_PORT}/udp
    networks:
      - media-net


  # ----------------------------------------------------------------------------
  #  BAZARR — Automatic subtitle downloader
  #  Access: http://<server-ip>:${BAZARR_PORT}
  #
  #  Monitors your Sonarr and Radarr libraries and automatically
  #  downloads subtitles for all content. Supports OpenSubtitles
  #  and Animetosho (recommended for anime).
  #
  #  config.sh connects Bazarr to Sonarr and Radarr automatically.
  #  You still need to add subtitle providers (OpenSubtitles etc)
  #  manually in the Bazarr web UI after setup.
  # ----------------------------------------------------------------------------
  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    restart: unless-stopped
    depends_on:
      - sonarr
      - radarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${BAZARR_CONFIG}:/config
      - ${MEDIA_ROOT}/movies:/media/movies
      - ${MEDIA_ROOT}/tvshows:/media/tvshows
      - ${MEDIA_ROOT}/anime:/media/anime
    ports:
      - ${BAZARR_PORT}:6767
    networks:
      - media-net
  
  
  # ----------------------------------------------------------------------------
  #  SHOKO SERVER — Anime library manager
  #  Access: http://<server-ip>:${SHOKO_PORT}
  #
  #  Manages and identifies your anime library using AniDB.
  #  Reads from the same /media/anime folder Sonarr writes to.
  #  Sonarr still handles searching and downloading — Shoko
  #  takes over organisation, metadata, and AniDB matching.
  #
  #  On first run, open the web UI and complete the setup wizard.
  #  Add /media/anime as an import folder and point it at AniDB.
  # ----------------------------------------------------------------------------
  shoko:
    image: ghcr.io/shokoanime/server:latest
    container_name: shoko
    restart: unless-stopped
    depends_on:
      - sonarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${SHOKO_CONFIG}:/home/shoko/.shoko
      - ${MEDIA_ROOT}/anime:/media/anime
    ports:
      - ${SHOKO_PORT}:8111
    networks:
      - media-net


# ------------------------------------------------------------------------------
#  Shared internal network
#  Services reference each other by container name, e.g:
#    http://sonarr:8989
#    http://qbittorrent:8081
#    http://jellyfin:8096
# ------------------------------------------------------------------------------
networks:
  media-net:
    driver: bridge