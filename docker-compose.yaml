---
# ==============================================================================
#  Media Server Stack
#  Services: Prowlarr, Sonarr, Radarr, qBittorrent, Jellyfin, Jellyseerr
#
#  All configuration is driven by the .env file in this directory.
#  Copy .env.example to .env, fill in your values, then run:
#
#    1. ./setup.1.sh          — create directories
#    2. docker compose up -d  — start all containers
#    3. Complete Jellyfin first-run setup in the browser
#    4. Add JELLYFIN_PASS to your .env
#    5. ./setup.2.sh          — wire all services together
#
#  Flow:
#    Prowlarr (find it) → Sonarr/Radarr (decide + queue it)
#      → qBittorrent (download it) → Sonarr/Radarr (organise it)
#      → Jellyfin (stream it) ← Jellyseerr (request it)
#
# ==============================================================================

services:

  # ----------------------------------------------------------------------------
  #  PROWLARR — Indexer manager
  #  Access: http://<server-ip>:${PROWLARR_PORT}
  #
  #  Add your torrent indexers here. Prowlarr syncs them to
  #  Sonarr and Radarr automatically — do not add indexers
  #  directly in Sonarr or Radarr.
  # ----------------------------------------------------------------------------
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${PROWLARR_CONFIG}:/config
    ports:
      - ${PROWLARR_PORT}:9696
    networks:
      - media-net


  # ----------------------------------------------------------------------------
  #  SONARR — TV show and anime manager
  #  Access: http://<server-ip>:${SONARR_PORT}
  #
  #  Monitors for new episodes, queues downloads through
  #  qBittorrent, then renames and moves completed files
  #  into your media library automatically.
  #
  #  In Sonarr, add two root folders:
  #    /media/tvshows  — for regular TV shows
  #    /media/anime    — for anime (Shoko reads from here)
  # ----------------------------------------------------------------------------
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    depends_on:
      - prowlarr
      - qbittorrent
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${SONARR_CONFIG}:/config
      - ${MEDIA_ROOT}/tvshows:/media/tvshows
      - ${MEDIA_ROOT}/anime:/media/anime
      - ${DOWNLOADS_DIR}:/downloads
    ports:
      - ${SONARR_PORT}:8989
    networks:
      - media-net


  # ----------------------------------------------------------------------------
  #  RADARR — Movie manager
  #  Access: http://<server-ip>:${RADARR_PORT}
  #
  #  Same as Sonarr but for movies. Monitors for new releases,
  #  queues downloads through qBittorrent, and organises
  #  completed files into your movie library.
  # ----------------------------------------------------------------------------
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    depends_on:
      - prowlarr
      - qbittorrent
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${RADARR_CONFIG}:/config
      - ${MEDIA_ROOT}/movies:/media/movies
      - ${DOWNLOADS_DIR}:/downloads
    ports:
      - ${RADARR_PORT}:7878
    networks:
      - media-net


  # ----------------------------------------------------------------------------
  #  QBITTORRENT — Torrent download client
  #  Access: http://<server-ip>:${QBIT_PORT}
  #
  #  A temporary password is generated on first startup and
  #  printed to the container log. The setup script reads it
  #  automatically. Once you set a permanent password through
  #  the web UI, it persists across restarts.
  #
  #  To view the temporary password manually:
  #    docker logs qbittorrent | grep "temporary password"
  # ----------------------------------------------------------------------------
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=${QBIT_PORT}
      - TORRENTING_PORT=${QBIT_TORRENT_PORT}
    volumes:
      - ${QBIT_CONFIG}:/config
      - ${DOWNLOADS_DIR}:/downloads
    ports:
      - ${QBIT_PORT}:${QBIT_PORT}
      - ${QBIT_TORRENT_PORT}:${QBIT_TORRENT_PORT}
      - ${QBIT_TORRENT_PORT}:${QBIT_TORRENT_PORT}/udp
    networks:
      - media-net


  # ----------------------------------------------------------------------------
  #  JELLYFIN — Media server
  #  Access: http://<server-ip>:${JELLYFIN_PORT}
  #
  #  Streams movies, TV shows, anime, music, and photos to
  #  any device on your local network. No account required,
  #  no telemetry, fully local.
  #
  #  Complete the first-run setup wizard in your browser before
  #  running setup.2.sh. Add your JELLYFIN_PASS to .env first.
  #
  #  Hardware transcoding: the devices section enables Intel
  #  iGPU transcoding. Remove it if your CPU has no iGPU
  #  (e.g. Ryzen 5 5500).
  # ----------------------------------------------------------------------------
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${JELLYFIN_CONFIG}:/config
      - ${JELLYFIN_CACHE}:/cache
      - ${MEDIA_ROOT}/movies:/media/movies
      - ${MEDIA_ROOT}/tvshows:/media/tvshows
      - ${MEDIA_ROOT}/anime:/media/anime
      - ${MEDIA_ROOT}/music:/media/music
      - ${MEDIA_ROOT}/photos:/media/photos
    ports:
      - ${JELLYFIN_PORT}:8096
    # Remove the devices section below if your CPU has no iGPU
    # devices:
    #   - /dev/dri:/dev/dri
    networks:
      - media-net


  # ----------------------------------------------------------------------------
  #  JELLYSEERR — Discovery and request manager
  #  Access: http://<server-ip>:${JELLYSEERR_PORT}
  #
  #  Users browse and request content here. Requests flow
  #  automatically into Sonarr or Radarr without users needing
  #  access to any other service.
  #
  #  setup.2.sh connects Jellyseerr to Jellyfin, Sonarr, and
  #  Radarr automatically after first-run setup is complete.
  # ----------------------------------------------------------------------------
  jellyseerr:
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    restart: unless-stopped
    depends_on:
      - sonarr
      - radarr
    environment:
      - TZ=${TZ}
    volumes:
      - ${JELLYSEERR_CONFIG}:/app/config
    ports:
      - ${JELLYSEERR_PORT}:5055
    networks:
      - media-net


# ------------------------------------------------------------------------------
#  Shared internal network
#  Services reference each other by container name, e.g:
#    http://sonarr:8989
#    http://qbittorrent:8081
#    http://jellyfin:8096
# ------------------------------------------------------------------------------
networks:
  media-net:
    driver: bridge